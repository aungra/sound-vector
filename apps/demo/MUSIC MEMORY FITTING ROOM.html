<body>
  <div id="app"></div>
  <script>
    const resonanceLabels = {
      remembered: "思い出した",
      heard: "聴こえた",
      worn: "着ていた気がする",
      strangely_familiar: "知らないのに懐かしい",
      body_reacted: "身体が反応した"
    };
    const questions = [
      { id: "place", title: "その音楽は、どこで鳴っていましたか？", options: ["港", "ライブハウス", "クラブ", "教会", "路面電車", "坂道", "部屋", "祭り"] },
      { id: "time", title: "記憶に近い時間帯は？", options: ["朝方", "昼", "夕方", "夜", "深夜", "雨の日"] },
      { id: "body", title: "身体にはどう残っていますか？", options: ["低音", "手拍子", "声", "足音", "湿度", "静けさ", "揺れ"] },
      { id: "feeling", title: "その時の感情に近いものは？", options: ["ひとり", "友人", "家族", "初恋", "喪失", "祈り", "高揚", "帰り道"] },
      { id: "cloth", title: "服の記憶はどんな感触ですか？", options: ["汗", "雨", "古着", "制服", "黒い服", "白い布", "ジャケット", "素肌"] }
    ];
    const moodOptions = [
      { id: "quiet", label: "静かな余韻", cue: "音が消えた後に残る輪郭。", tags: ["静けさ","夜","白い布","帰り道"], seed: 11, pattern: "silent" },
      { id: "wet", label: "雨と低音", cue: "濡れた布と床下の振動。", tags: ["雨","低音","クラブ","汗"], seed: 23, pattern: "wave" },
      { id: "harbor", label: "港の風", cue: "潮の匂いと遠くのラジオ。", tags: ["港","昼","家族","白い布"], seed: 37, pattern: "wind" },
      { id: "festival", label: "祭りの熱", cue: "人の動きが線になって残る。", tags: ["祭り","手拍子","高揚","声"], seed: 51, pattern: "pulse" },
      { id: "prayer", label: "祈りの反響", cue: "聖堂の残響と影。", tags: ["教会","祈り","声","黒い服"], seed: 67, pattern: "arch" },
      { id: "friend", label: "友人と朝方", cue: "明け方にほどける会話。", tags: ["友人","朝方","古着","帰り道"], seed: 79, pattern: "crossing" }
    ];
    const engineOptions = [
      { id: "paper", label: "Paper Vector", note: "編集しやすい太線構成" },
      { id: "flow_wave", label: "Flow Wave", note: "波形と帯の反復" },
      { id: "flow_topo", label: "Flow Topo", note: "等高線状の記憶層" },
      { id: "flow_iso", label: "Flow Iso", note: "立体格子と面" },
      { id: "flow_cells", label: "Flow Cells", note: "セル状の断片構成" },
      { id: "api_recraft", label: "Recraft API", note: "外部AIでSVG生成", external: true, provider: "recraft" },
      { id: "api_supervector", label: "Supervector API", note: "外部AIで図案生成", external: true, provider: "supervector" }
    ];
    const seedCreators = [
      { id: "c-01", name: "Rina Kawahara", profile: "長崎の坂道と夜の店先を採集するグラフィックデザイナー。", sns: "@rina.delta" },
      { id: "c-02", name: "Masato Ide", profile: "港、車窓、家族のラジオから服の絵柄を起こすクリエイター。", sns: "@ide_line" },
      { id: "c-03", name: "Haru Onizuka", profile: "聖堂、祭り、電子音の距離を布に翻訳するアーティスト。", sns: "@haru.doh" }
    ];
    const seedTshirts = [
      makeShirt("t-01", "c-01", "Rain After Bass", "クラブを出た朝方、雨で冷えたTシャツに低音だけが残っていた記憶。", "Wall A / 入口左", "6,600 yen", "会場受注 / M-L-XL", ["クラブ","朝方","雨","低音","友人","汗","高揚"]),
      makeShirt("t-02", "c-02", "Father's Radio Shirt", "港へ向かう車の中、曲名を知らないまま身体に残った家族のラジオ。", "Table B / 中央", "5,900 yen", "現品販売 / Lのみ", ["港","昼","家族","車","ラジオ","白い布","帰り道"]),
      makeShirt("t-03", "c-03", "Procession Echo", "祭囃子と聖堂の残響が同じ街で重なる、長崎らしい祈りの服。", "Wall C / スクリーン横", "7,200 yen", "会場受注 / S-M-L", ["祭り","教会","祈り","手拍子","声","黒い服","夜"])
    ];
    function makeShirt(id, creatorId, title, description, location, price, stockNote, tags) {
      return {
        id, creatorId, title, description, location, price, stockNote, tags,
        image: `images/${id}.svg`,
        tracks: Array.from({ length: 10 }, (_, i) => ({
          id: `${id}-${String(i + 1).padStart(2, "0")}`,
          title: ["After Floor","Wet Neon","Last Friend","Smoke Door","Taxi Line","Red Stamp","Rain Cable","Outside Voice","One More","Dry Cotton"][i],
          artist: ["Imaginary Port","Saka-Machi","Delta Loop","North Pier","Machi Echo"][i % 5],
          comment: "曲にまつわる短いコメント。展示前に実曲名へ差し替えます。",
          tags: [tags[i % tags.length], tags[(i + 2) % tags.length], tags[(i + 4) % tags.length]]
        }))
      };
    }
    const keys = { creators: "mmfr.creators", tshirts: "mmfr.tshirts", sessions: "mmfr.sessions", resonances: "mmfr.resonances", apiConfig: "mmfr.apiConfig" };
    const inlineArt = {};
    const state = { view: "home", answers: {}, moodId: null, youtubeUrl: "", audioFeatures: null, sourceMood: null, variantSalt: 0, engineId: "youtube_audio", realtime: false, tick: 0, session: null, generated: null, workId: null, message: "", genreProfiles: null };
    let realtimeTimer = null;
    let activeReconstructionContext = null;
    let activeReconstructionTimer = null;
    let activeReconstructionAudio = null;
    let activeReconstructionAudioUrl = "";
    function read(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } }
    function write(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    function creators() { return read(keys.creators, seedCreators); }
    function tshirts() { return read(keys.tshirts, seedTshirts); }
    function sessions() { return read(keys.sessions, []); }
    function resonances() { return read(keys.resonances, []); }
    function storageSafeFeatures(features) {
      if (!features?.detail) return features || null;
      const detail = { ...features.detail };
      if (detail.pcmSketch) {
        detail.pcmSketch = "";
        detail.pcmSketchStorageNote = "Omitted from localStorage. Use the current generated shirt or exported reversible SVG for PCM reconstruction.";
      }
      return { ...features, detail };
    }
    function stripReversibleMetadata(svg) {
      return String(svg || "").replace(/<metadata[^>]*id=["']mmfr-reversible["'][^>]*>[\s\S]*?<\/metadata>/, "");
    }
    function storageSafeShirt(shirt) {
      if (!shirt) return null;
      return {
        ...shirt,
        art: stripReversibleMetadata(shirt.art),
        reversiblePayload: null,
        audioFeatures: storageSafeFeatures(shirt.audioFeatures)
      };
    }
    function storageSafeSession(session) {
      return session?.generatedShirt
        ? { ...session, generatedShirt: storageSafeShirt(session.generatedShirt) }
        : session;
    }
    function storeSession(session) {
      const next = [storageSafeSession(session)].concat(sessions().map(storageSafeSession)).slice(0, 8);
      try {
        write(keys.sessions, next);
      } catch {
        const tiny = { ...storageSafeSession(session), generatedShirt: session.generatedShirt ? { ...storageSafeShirt(session.generatedShirt), art: "" } : null };
        write(keys.sessions, [tiny]);
      }
    }
    function apiConfig() {
      const saved = read(keys.apiConfig, {});
      return { endpoint: normaliseApiEndpoint(saved.endpoint || "http://127.0.0.1:4194/api/audio-analyze") };
    }
    function normaliseApiEndpoint(endpoint) {
      const value = String(endpoint || "").trim();
      if (!value) return "";
      if (/\/api\/audio-analyze\/?$/.test(value)) return value.replace(/\/$/, "");
      return value.replace(/\/+$/, "") + "/api/audio-analyze";
    }
    function unique(items) { return [...new Set(items.filter(Boolean))]; }
    function seeded(seed) {
      let value = seed % 2147483647;
      return () => {
        value = value * 48271 % 2147483647;
        return value / 2147483647;
      };
    }
    function svgNumber(value) { return Math.round(value * 10) / 10; }
    function svgGroup(id, children) {
      return `<g id="${id}" data-layer="${id}">${children.join("")}</g>`;
    }
    function svgGroupWithAttrs(id, children, attrs = "") {
      return `<g id="${id}" data-layer="${id}" ${attrs}>${children.join("")}</g>`;
    }
    function svgPath(d, width = 14, extra = "") {
      return `<path d="${d}" fill="none" stroke="#111" stroke-width="${width}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" ${extra}/>`;
    }
    function svgFill(d, extra = "") {
      return `<path d="${d}" fill="#111" stroke="#111" stroke-width="0" stroke-linejoin="round" ${extra}/>`;

          ${state.message ? `<p class="tag">${state.message}</p>` : ""}
          <div class="realtime-readout"><p><strong>Audio fingerprint</strong><br>曲ごとに構造を選択</p><p><strong>Onset / Chroma</strong><br>裂け目・軌道・張力線へ変換</p><p><strong>Protected data</strong><br>書き出しSVG内で復元用に保持</p></div>
          <div class="api-config"><label><span class="eyebrow">YouTube audio analysis server</span><input id="apiEndpoint" value="${endpointValue}" placeholder="https://example.com/api/audio-analyze"></label><button class="secondary" onclick="saveApiEndpoint()">保存</button></div></section>` :
          `<section class="panel"><div class="top"><div><p class="eyebrow">Generated design</p><h2>${generatedHeading}</h2></div><div>${generatedActions}</div></div>
          <div class="generated-layout"><article class="generated-preview">${renderShirtArt(generated)}<div class="design-spec"><p><strong>音源</strong><br>${sourceLabel}</p><p><strong>生成</strong><br>${selectedEngine.label}</p><p><strong>状態</strong><br>${generatedStateText}</p><p><strong>Genre</strong><br>${genreLabel}</p><p><strong>Tempo</strong><br>${features?.tempo ? `${features.tempo} BPM` : "local"}</p><p><strong>Centroid</strong><br>${features?.centroid ? `${features.centroid} Hz` : "SVG"}</p><p><strong>可逆PCM</strong><br>${formatPcmGeometryText(features)}</p></div></article><article><p>${generated.tags.map(t => `<span class="tag">${t}</span>`).join("")}</p><h3>${generated.title}</h3><p>${generated.description}</p>${generated.youtubeUrl ? `<p class="muted"><a href="${escapeAttr(generated.youtubeUrl)}" target="_blank" rel="noreferrer">参照YouTubeリンク</a></p>` : ""}${state.message ? `<p class="tag">${state.message}</p>` : ""}${generated.externalNote ? `<p class="tag">${generated.externalNote}</p>` : ""}<p class="muted">${generated.stockNote}</p><button class="primary" onclick="acceptRealtimeDesign();nav('work','${generated.id}')">詳細と共鳴を見る</button></article></div></section>`}
        ${generated ? renderReversiblePanel(generated) : ""}
        ${isReversibleAudio || !generated ? renderReversiblePatternExplanation(features) : renderAudioMappingDiagram(features)}
      </main>`;
    }
    function renderWork() {
      const shirt = refreshReversibleSoundClothShirt(findShirt(state.workId));
      if (!shirt) return `<main class="wrap"><section class="panel"><h2>作品が見つかりません</h2><button class="secondary" onclick="nav('home')">戻る</button></section></main>`;
      const creator = shirt.generated ? { name: "Mood Generator", profile: "来場者が選んだ現状のムードから、一色のTシャツ図案をその場で組み立てます。" } : creators().find(c => c.id === shirt.creatorId);
      const count = resonances().filter(r => r.tshirtId === shirt.id).length;
      return `<main class="wrap"><section class="panel"><div class="top"><button class="secondary" onclick="nav('home')">受付に戻る</button>${renderNav()}</div></section>
        <section class="detail"><article class="panel"><p class="eyebrow">${creator?.name || ""}</p><h1>${shirt.title}</h1><p>${shirt.description}</p><p>${shirt.tags.map(t => `<span class="tag">${t}</span>`).join("")}</p></article><aside class="panel">${renderShirtArt(shirt, "3/4")}<h2>展示・販売</h2><p><strong>展示位置</strong><br>${shirt.location}</p><p><strong>価格</strong><br>${shirt.price}</p><p><strong>在庫メモ</strong><br>${shirt.stockNote}</p><p class="muted">${creator?.profile || ""}</p></aside></section>
        ${shirt.generated ? (isReversibleAudioShirt(shirt) ? renderReversiblePatternExplanation(shirt.audioFeatures) : renderAudioMappingDiagram(shirt.audioFeatures)) : ""}
        ${renderReversiblePanel(shirt)}
        <section class="panel"><div class="top"><h2>10曲プレイリスト</h2><strong>${count} resonances</strong></div><ol class="tracks">${shirt.tracks.map((tr, i) => `<li class="card"><p class="eyebrow">TRACK ${String(i + 1).padStart(2, "0")}</p><h3>${tr.title}</h3><p class="muted">${tr.artist}</p><p>${tr.comment}</p><p>${tr.tags.map(t => `<span class="tag">${t}</span>`).join("")}</p></li>`).join("")}</ol></section>
        <section class="panel"><h2>共鳴を残す</h2><p class="muted">投票ではなく、あなたの身体に起きた反応を匿名で残します。</p><textarea id="comment" placeholder="任意コメント"></textarea><div class="resonance">${Object.keys(resonanceLabels).map(k => `<button onclick="addResonance('${k}')">${resonanceLabels[k]}</button>`).join("")}</div>${state.message ? `<p class="tag">${state.message}</p>` : ""}</section></main>`;
    }
    function renderScreen() {
      const tags = aggregateTags();
      const types = aggregateTypes();
      const topTag = tags[0]?.[0] || "港";
      const screenShirts = tshirts().concat(sessions().map(s => s.generatedShirt).filter(Boolean));
      const cue = screenShirts.flatMap(t => t.tracks.map(track => ({ t, track }))).find(x => x.track.tags.includes(topTag));
      return `<main class="screen"><section class="wrap"><header class="top panel"><div><p class="eyebrow">SOUND VECTOR FITTING ROOM</p><h1>会場の音響反応</h1></div>${renderNav()}</header><div class="screen-grid">
        <section class="panel"><p class="eyebrow">Current dominant memories</p><div class="big-tags">${(tags.length ? tags : [["港",1],["雨",1],["夜",1],["低音",1]]).map(([tag, n]) => `<div class="big-tag"><strong>${tag}</strong><span>${Math.round(n * 10) / 10}</span></div>`).join("")}</div></section>
        <section class="panel"><p class="eyebrow">Resonance</p>${types.length ? types.map(([type, count]) => `<p class="top"><strong>${resonanceLabels[type]}</strong><strong>${count}</strong></p>`).join("") : "<h2>最初の共鳴を待っています</h2>"}</section>
        <section class="panel"><p class="eyebrow">Next music cue</p><h2>${cue?.track.title || "未選曲"}</h2><p>${cue?.track.artist || ""}</p><p class="muted">「${topTag}」に反応した記憶が増えているため</p></section>
        <section class="panel"><p class="eyebrow">Archive</p><h2>${sessions().length} sessions / ${resonances().length} resonances</h2></section>
      </div></section></main>`;
    }
    function renderAdmin() {
      return `<main class="wrap"><section class="panel top"><div><p class="eyebrow">ADMIN</p><h1>運営管理</h1></div>${renderNav()}</section>
        <section class="metrics"><div class="panel metric">来場セッション<strong>${sessions().length}</strong></div><div class="panel metric">共鳴<strong>${resonances().length}</strong></div><div class="panel metric">出展者<strong>${creators().length}</strong></div><div class="panel metric">Tシャツ<strong>${tshirts().length}</strong></div></section>
        <section class="panel"><button class="secondary" onclick="saveAdmin()">保存</button> <button class="secondary" onclick="download('sound-vector-fitting-room-archive.json', JSON.stringify({creators:creators(),tshirts:tshirts(),visitorSessions:sessions(),resonances:resonances(),exportedAt:new Date().toISOString()}, null, 2), 'application/json')">JSON書き出し</button>${state.message ? `<p class="tag">${state.message}</p>` : ""}</section>
        <section class="admin-grid"><div class="panel"><h2>出展者 JSON</h2><textarea id="creatorsText" class="editor">${JSON.stringify(creators(), null, 2)}</textarea></div><div class="panel"><h2>Tシャツ / プレイリスト JSON</h2><textarea id="tshirtsText" class="editor">${JSON.stringify(tshirts(), null, 2)}</textarea></div></section>
      </main>`;
    }
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = state.view === "screen" ? renderScreen() : state.view === "admin" ? renderAdmin() : state.view === "work" ? renderWork() : renderHome();
    }
    function cleanupStoredSessions() {
      const stored = sessions();
      if (!stored.length) return;
      try {
        write(keys.sessions, stored.map(storageSafeSession).slice(0, 8));
      } catch {
        write(keys.sessions, []);
      }
    }
    async function loadCalibratedGenreProfiles() {
      if (location.protocol === "file:") return;
      try {
        const response = await fetch("genre-training/generated-profiles.json", { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        const profiles = payload?.profiles || payload;
        if (profiles && typeof profiles === "object") {
          state.genreProfiles = profiles;
          render();
        }
      } catch {}
    }
    cleanupStoredSessions();
    render();
    loadCalibratedGenreProfiles();
  </script>
</body>
</html>
